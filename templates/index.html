<!doctype html>
<html>
<head>
    <title>Medical PDF Records Blockchain</title>
</head>
<body>
    <h1>Upload Medical Record (PDF)</h1>
    <form method="POST" action="/upload" enctype="multipart/form-data">
        <input type="file" name="file" accept="application/pdf">
        <input type="submit" value="Upload">
    </form>

    <h2>Available Records</h2>
    <ul>
        {% for file in files %}
        <li>
            <a href="{{ url_for('view_file', filename=file) }}">{{ file }}</a>
            <a href="{{ url_for('delete_file', filename=file) }}">[Delete]</a>
        </li>
        {% endfor %}
    </ul>

    <h2>Blockchain Log</h2>
    <pre style="white-space: pre-wrap;">{{ chain | tojson(indent=2) }}</pre>
</body>
</html>
